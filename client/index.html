      // Nuclear force refresh to kill old PWA cache
      if (!localStorage.getItem('force_refresh_v2.3')) {

        if ('serviceWorker' in navigator) {

            for(let reg of regs) reg.unregister();
            window.location.reload(true);
          });
        } else {
          window.location.reload(true);
        }
      }
